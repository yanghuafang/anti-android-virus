plugins {
    id 'com.android.application'
}

android {
    namespace 'com.av.aav'
    compileSdk 36
    ndkVersion '29.0.14206865'

    defaultConfig {
        applicationId 'com.av.aav'
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName '1.0'

        ndk {
            abiFilters 'arm64-v8a'
        }
        externalNativeBuild {
            cmake {
                arguments '-DANDROID_STL=c++_static'
            }
        }
    }

    externalNativeBuild {
        cmake {
            path 'src/main/cpp/CMakeLists.txt'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
